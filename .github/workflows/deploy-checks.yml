name: Deploy Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  route-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run check-routes
